events {
    worker_connections 2048;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json
        application/ld+json
        application/manifest+json
        image/svg+xml
        font/ttf
        font/otf
        font/woff2;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=15r/s;
    limit_req_zone $binary_remote_addr zone=download:10m rate=5r/s;

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name aquavirdb.com www.aquavirdb.com;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name aquavirdb.com www.aquavirdb.com;

        # SSL — managed by certbot
        ssl_certificate     /etc/letsencrypt/live/aquavirdb.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/aquavirdb.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        # Security headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # Document root
        root /usr/share/nginx/html;
        index index.html;

        # Vendor JS/CSS — long cache (immutable, versioned filenames)
        location /static/vendor/ {
            alias /usr/share/nginx/html/vendor/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Tailwind CDN and other CSS/JS assets — cache 30 days
        location /static/ {
            alias /usr/share/nginx/html/;
            expires 30d;
            add_header Cache-Control "public, must-revalidate";
            access_log off;
        }

        # Download area — static files with directory listing
        location /downloads/ {
            limit_req zone=download burst=10 nodelay;
            alias /usr/share/nginx/html/downloads/;
            autoindex on;
            autoindex_format html;
            autoindex_localtime on;
            add_header Access-Control-Allow-Origin "*";
            types {
                application/octet-stream fasta faa fna;
                text/csv csv;
                application/vnd.openxmlformats-officedocument.spreadsheetml.sheet xlsx;
            }
        }

        # API — rate-limited proxy
        location /api/ {
            limit_req zone=api burst=25 nodelay;
            proxy_pass http://api:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;
        }

        # Health check — no rate limit
        location = /api/health {
            proxy_pass http://api:8000/api/health;
            proxy_set_header Host $host;
        }

        # OpenAPI schema
        location = /openapi.json {
            proxy_pass http://api:8000/openapi.json;
            proxy_set_header Host $host;
        }

        # Api docs
        location = /docs {
            proxy_pass http://api:8000/docs;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /redoc {
            proxy_pass http://api:8000/redoc;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Fallback: all other paths → try static file, then .html, then SSR via FastAPI
        # This handles: /, /viruses, /hosts, /search, /stats, /about, /virus/{id}, etc.
        # /guide → tries /guide, then /guide.html (static), then falls back to @api
        location / {
            try_files $uri $uri.html $uri/ @api;
        }

        location @api {
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;
        }
    }
}
