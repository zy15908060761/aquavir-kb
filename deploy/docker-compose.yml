version: '3.8'

services:
  api:
    build:
      context: ..
      dockerfile: Dockerfile
    volumes:
      - ./data/sequences:/app/sequences:rw
      - ../public_downloads:/app/public_downloads:ro
    expose:
      - "8000"
    environment:
      - DATABASE_URL=postgresql://aquavir:${DB_PASSWORD}@pgbouncer:6432/aquavir_kb
      - AQUAVIR_BLAST_DIR=/app/blastdb
      - AQUAVIR_DB_VERSION=2.0.0
      # Single-worker Uvicorn tuned for 2C/4GB
      - UVICORN_WORKERS=1
      - UVICORN_THREADS=4
      - UVICORN_MAX_CONNECTIONS=1000
      - UVICORN_TIMEOUT_KEEP_ALIVE=5
    restart: unless-stopped
    depends_on:
      pgbouncer:
        condition: service_started
    # Hard memory cap for 4GB host (2C + nginx + pg + pgbouncer)
    mem_limit: 1.2g
    memswap_limit: 1.2g

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./static:/usr/share/nginx/html:ro
      - ../public_downloads:/tmp/downloads:ro
      - certbot_www:/var/www/certbot:ro
      - ssl_certs:/etc/letsencrypt:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
    restart: unless-stopped
    mem_limit: 256m

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aquavir_kb
      POSTGRES_USER: aquavir
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init_db.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    expose:
      - "5432"
    restart: unless-stopped
    mem_limit: 1.2g
    # Tune for 2C/4GB; keep shared_buffers modest
    command: >
      postgres
      -c shared_buffers=256MB
      -c effective_cache_size=512MB
      -c work_mem=8MB
      -c maintenance_work_mem=128MB
      -c max_connections=50
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aquavir -d aquavir_kb"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgbouncer:
    image: bitnami/pgbouncer:latest
    environment:
      PGBOUNCER_DATABASE: aquavir_kb
      PGBOUNCER_PORT: "6432"
      PGBOUNCER_MAX_CLIENT_CONN: "200"
      PGBOUNCER_DEFAULT_POOL_SIZE: "20"
      PGBOUNCER_RESERVE_POOL_SIZE: "5"
      PGBOUNCER_RESERVE_POOL_TIMEOUT: "3"
      POSTGRESQL_HOST: db
      POSTGRESQL_USERNAME: aquavir
      POSTGRESQL_PASSWORD: ${DB_PASSWORD}
    expose:
      - "6432"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 128m

volumes:
  ssl_certs:
  certbot_www:
  pgdata:
