<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AquaVir-KB{% endblock %}</title>
    {% block extra_head %}{% endblock %}
    <style>
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        :root {
            --bg: #f5f5f5;
            --surface: #fff;
            --nav-bg: #fff;
            --primary: #205493;
            --primary-hover: #123a6e;
            --primary-light: #e8f0f8;
            --accent: #1a7f37;
            --text: #222;
            --text-secondary: #555;
            --text-muted: #888;
            --border: #ddd;
            --shadow: 0 1px 2px rgba(0,0,0,0.06);
            --radius: 4px;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, "Noto Sans SC", sans-serif;
            font-size: 14px; line-height: 1.5;
            color: var(--text); background: var(--bg);
            min-height: 100vh; display: flex; flex-direction: column;
        }
        a { color: var(--primary); text-decoration: none; }
        a:hover { text-decoration: underline; }

        .nav { background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .nav-inner { max-width: 1200px; margin: 0 auto; padding: 0 16px; height: 40px; display: flex; align-items: center; gap: 12px; }
        .nav-brand { font-weight: 600; font-size: 14px; color: var(--primary); white-space: nowrap; }
        .nav-brand:hover { text-decoration: none; color: var(--primary-hover); }
        .nav-links { display: flex; gap: 1px; overflow-x: auto; }
        .nav-links a { color: var(--text-secondary); padding: 4px 10px; font-size: 13px; border-radius: var(--radius); white-space: nowrap; }
        .nav-links a:hover { background: var(--primary-light); text-decoration: none; color: var(--primary); }
        .nav-links a.active { background: var(--primary-light); color: var(--primary); font-weight: 500; }
        .nav-select { font-size:12px; padding:2px 6px; border:1px solid var(--border); border-radius:2px; background:var(--surface); color:var(--text-secondary); }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 16px; flex: 1; width: 100%; }
        .page-content { padding: 16px 0; }
        .page-title { font-size: 20px; font-weight: 600; color: var(--text); margin-bottom: 12px; padding-bottom: 6px; border-bottom: 2px solid var(--primary-light); }

        .search-box { display: flex; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; background: var(--surface); }
        .search-box:focus-within { border-color: var(--primary); box-shadow: 0 0 0 2px var(--primary-light); }
        .search-box input { flex: 1; border: none; padding: 6px 10px; font-size: 13px; outline: none; background: transparent; }
        .search-box button { background: var(--primary); border: none; border-left: 1px solid var(--border); padding: 6px 14px; cursor: pointer; color: #fff; font-size: 13px; font-weight: 500; }
        .search-box button:hover { background: var(--primary-hover); }

        .stats { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 6px; margin: 12px 0; }
        .stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 12px; }
        .stat .num { font-size: 18px; font-weight: 600; color: var(--text); line-height: 1.2; }
        .stat .lbl { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 1px; }

        .section { font-size: 15px; font-weight: 600; margin: 16px 0 8px; color: var(--text); }

        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        table th { text-align: left; padding: 6px 8px; border-bottom: 2px solid var(--border); font-weight: 600; color: var(--text-secondary); font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }
        table td { padding: 6px 8px; border-bottom: 1px solid var(--border); }
        table tr:hover td { background: var(--primary-light); }

        .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; margin-bottom: 8px; }
        .card-h { font-size: 13px; font-weight: 600; padding-bottom: 6px; border-bottom: 1px solid var(--border); margin-bottom: 6px; color: var(--text); }

        .tag { display: inline-block; padding: 1px 7px; font-size: 11px; border-radius: 2px; background: var(--primary-light); color: var(--primary); border: 1px solid var(--border); }
        a.tag:hover { text-decoration: none; background: var(--primary); color: #fff; }

        .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        @media (max-width: 768px) { .two-col, .three-col { grid-template-columns: 1fr; } .stats { grid-template-columns: repeat(2, 1fr); } }

        .footer { border-top: 1px solid var(--border); padding: 12px 0; font-size: 11px; color: var(--text-muted); text-align: center; margin-top: auto; }
        .footer a { color: var(--text-muted); }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-inner">
            <a href="/" class="nav-brand">AquaVir-KB</a>
            <div class="nav-links">
                <a href="/" class="active">Home</a>
                <a href="/search">Search</a>
                <a href="/viruses">Viruses</a>
                <a href="/hosts">Hosts</a>
                <a href="/browse/taxonomy">Taxonomy</a>
                <a href="/stats">Statistics</a>
                <a href="/download">Download</a>
                <a href="/about">About</a>
            </div>
            <select class="nav-select" onchange="if(this.value)location=this.value">
                <option value="">Jump...</option>
                <option value="/search?q=WSSV">WSSV</option>
                <option value="/search?q=TSV">TSV</option>
                <option value="/search?q=IHHNV">IHHNV</option>
                <option value="/search?q=YHV">YHV</option>
                <option value="/search?q=OsHV-1">OsHV-1</option>
            </select>
        </div>
    </nav>
    <main class="container page-content">
        {% block content %}{% endblock %}
    </main>
    <footer class="footer">
        <div class="container">AquaVir-KB &bull; <a href="https://creativecommons.org/licenses/by/4.0/">CC-BY 4.0</a> &bull; <a href="https://github.com/zy15908060761/CDB">GitHub</a></div>
    </footer>
    {% block scripts %}{% endblock %}
    {% block extra_scripts %}{% endblock %}
</body>
</html>
